<svg width="800" height="620" viewBox="0 0 800 620" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Multi-agent AI research system architecture</title>
<desc>Animated flowchart showing a request flowing from user through guard layer, agentic loop with WebSearch and fetchUrl tools, context compression, to a structured JSON report</desc>

<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>

  <style>
    @keyframes fadeDown {
      0%   { opacity: 0; transform: translateY(-6px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes dash {
      to { stroke-dashoffset: -20; }
    }
    @keyframes pulse {
      0%,100% { opacity: 0.4; }
      50%      { opacity: 1; }
    }
    @keyframes loopSpin {
      0%   { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: -60; }
    }

    .n0 { animation: fadeDown 0.5s ease 0.2s both; }
    .n1 { animation: fadeDown 0.5s ease 0.9s both; }
    .n2 { animation: fadeDown 0.5s ease 1.6s both; }
    .n3 { animation: fadeDown 0.5s ease 2.1s both; }
    .n4 { animation: fadeDown 0.5s ease 2.6s both; }
    .n5 { animation: fadeDown 0.5s ease 3.1s both; }
    .n6 { animation: fadeDown 0.5s ease 3.8s both; }
    .n7 { animation: fadeDown 0.5s ease 4.5s both; }

    .l01 { animation: fadeDown 0.3s ease 0.7s both; }
    .l12 { animation: fadeDown 0.3s ease 1.4s both; }
    .l23 { animation: fadeDown 0.3s ease 1.9s both; }
    .l24 { animation: fadeDown 0.3s ease 2.4s both; }
    .l45 { animation: fadeDown 0.3s ease 2.9s both; }
    .l56 { animation: fadeDown 0.3s ease 3.6s both; }
    .l67 { animation: fadeDown 0.3s ease 4.3s both; }

    .flow-line {
      stroke-dasharray: 6 4;
      animation: dash 1.2s linear infinite;
    }
    .flow-purple { stroke: #7F77DD; }
    .flow-teal   { stroke: #1D9E75; }
    .flow-amber  { stroke: #BA7517; }

    .loop-border {
      stroke-dasharray: 8 4;
      animation: loopSpin 3s linear infinite;
    }
    .blink { animation: pulse 2s ease-in-out infinite; }

    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  </style>
</defs>

<rect width="800" height="620" fill="#ffffff"/>

<!-- ── Node 0: User request ── -->
<g class="n0">
  <rect x="300" y="20" width="200" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="400" y="43" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">User request</text>
</g>

<!-- Arrow 0→1 -->
<line class="l01 flow-line flow-purple" x1="400" y1="64" x2="400" y2="96" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- ── Node 1: Guard layer ── -->
<g class="n1">
  <rect x="255" y="96" width="290" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="400" y="118" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">Guard layer</text>
  <text x="400" y="138" text-anchor="middle" font-size="12" fill="#534AB7">validateInput — Groq LLaMA 3.3</text>
</g>

<!-- Arrow 1→2 -->
<line class="l12 flow-line flow-purple" x1="400" y1="152" x2="400" y2="184" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- ── Node 2: Agentic loop container ── -->
<g class="n2">
  <rect x="80" y="184" width="640" height="220" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="120" y="206" font-size="13" font-weight="500" fill="#085041">Agentic loop</text>
  <text x="120" y="222" font-size="11" fill="#0F6E56">Gemini 2.5-flash  ·  max 10 iterations</text>
</g>

<!-- ── Node 3: WebSearch ── -->
<g class="n3">
  <rect x="110" y="238" width="200" height="56" rx="8" fill="#ffffff" stroke="#0F6E56" stroke-width="1"/>
  <text x="210" y="260" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">WebSearch</text>
  <text x="210" y="278" text-anchor="middle" font-size="11" fill="#0F6E56">Serper API — 10 URLs</text>
</g>

<!-- Arrow 3→4 -->
<line class="l24 flow-line flow-teal" x1="310" y1="266" x2="368" y2="266" stroke-width="1.5" marker-end="url(#arr2)"/>

<!-- ── Node 4: fetchUrl ── -->
<g class="n4">
  <rect x="368" y="238" width="200" height="56" rx="8" fill="#ffffff" stroke="#854F0B" stroke-width="1"/>
  <text x="468" y="260" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">fetchUrl</text>
  <text x="468" y="278" text-anchor="middle" font-size="11" fill="#854F0B">fetch — strip HTML — slice</text>
</g>

<!-- Arrow 4→5 -->
<line class="l45 flow-line flow-amber" x1="468" y1="294" x2="468" y2="326" stroke-width="1.5" marker-end="url(#arr3)"/>

<!-- ── Node 5: Summarizer ── -->
<g class="n5">
  <rect x="368" y="326" width="200" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <text x="468" y="348" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">Summarizer</text>
  <text x="468" y="366" text-anchor="middle" font-size="11" fill="#854F0B">Groq LLaMA — 500 words</text>
</g>

<!-- Return arrow: summarizer back into loop (L-shape avoiding boxes) -->
<path class="l56 flow-line flow-teal" d="M368 354 L260 354 L210 294" fill="none" stroke-width="1.5" marker-end="url(#arr2)"/>
<text class="n5 blink" x="280" y="346" font-size="10" fill="#0F6E56">loop back</text>

<!-- Arrow loop→output -->
<line class="l56 flow-line flow-purple" x1="400" y1="404" x2="400" y2="436" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- ── Node 6: Structured JSON ── -->
<g class="n6">
  <rect x="210" y="436" width="380" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="400" y="458" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">Structured JSON report</text>
  <text x="400" y="476" text-anchor="middle" font-size="11" fill="#534AB7">title · sections · techStack · sources · useCases</text>
</g>

<!-- Arrow 6→7 -->
<line class="l67 flow-line flow-purple" x1="400" y1="492" x2="400" y2="524" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- ── Node 7: Response ── -->
<g class="n7">
  <rect x="290" y="524" width="220" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="400" y="547" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">res.json(report)</text>
</g>

<!-- Legend -->
<g class="n7">
  <rect x="48" y="524" width="180" height="72" rx="6" fill="#f8f8f6" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="60" y="543" font-size="11" font-weight="500" fill="#444441">Legend</text>
  <rect x="60" y="552" width="10" height="10" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="76" y="562" font-size="10" fill="#534AB7">Gemini 2.5-flash</text>
  <rect x="60" y="568" width="10" height="10" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="76" y="578" font-size="10" fill="#0F6E56">Agentic loop</text>
  <rect x="60" y="584" width="10" height="10" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="76" y="594" font-size="10" fill="#854F0B">Groq LLaMA 3.3</text>
</g>

</svg>
